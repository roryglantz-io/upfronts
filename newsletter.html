<style id="soft-mode-overrides">
/* SOFT MODE — inlined so it's never stale-cached */
body.soft {
  /* UM brand palette — hero colors */
  --um-red: #FF3534;          /* New Heritage Red */
  --um-red-deep: #D11E1D;
  --um-flamingo: #F585DA;     /* Flamingo */
  --um-orchid: #806FEA;       /* Orchid (gradient partner) */
  --um-river: #045195;        /* River (replaces Lake) */
  --um-lake: #045195;         /* alias → River */
  --um-mint: #045195;         /* Mint → repointed to River per brand direction */
  --um-sunburst: #FFB84E;     /* Sunburst */
  --um-turmeric: #CF5700;     /* Turmeric (deep orange) */
  /* Brand gradients (top → bottom per UM guidelines) */
  --um-grad-red: linear-gradient(180deg, #F585DA 0%, #FF3534 100%);      /* Flamingo → Heritage Red */
  --um-grad-flamingo: linear-gradient(180deg, #806FEA 0%, #F585DA 100%); /* Orchid → Flamingo */
  --um-grad-lake: linear-gradient(180deg, #045195 0%, #806FEA 100%);     /* River / Orchid */
  --um-grad-mint: linear-gradient(180deg, #3197EE 0%, #045195 100%);     /* Sky-blue → River (replaces Mint→River) */
  --um-grad-sunburst: linear-gradient(180deg, #FFB84E 0%, #045195 100%); /* Sunburst → River (replaces Sunburst→Mint) */
  --um-grad-heritage: linear-gradient(180deg, #FF3534 0%, #FFB84E 100%); /* Red → Sunburst */
  /* Page backgrounds — UM neutrals (Snow / Marble / Stone) */
  --paper: #FFFFFF;           /* Snow */
  --paper-2: #F6F5F5;         /* Marble */
  --paper-3: #DEDBD6;         /* Stone */
  --ink: #1D1A15;
  --ink-2: #2A2520;
  --f-display: 'Newsreader', 'Georgia', serif;
  --f-mono: 'Archivo', 'Helvetica Neue', sans-serif;
}

/* ============================================================
   SECTION ACCENT RHYTHM — each major section gets a brand

   bleeds or gets cut off regardless of wrap length.
   ============================================================ */

/* Gradient headlines — REMOVED. Section heads are now plain with

}

  opacity: 1 !important;

/* (Cream-on-gradient rules removed — headers now use heritage red on paper.) */

/* Body content in gradient-header sections — flip cream → ink + swap red accents to
