name: Generate PDF

on:
  push:
    branches: [main]
    paths:
      - 'newsletter.html'
      - 'styles.css'
      - 'src/**'
      - 'generate-pdf.js'
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer serve

      - name: Start local server
        run: npx serve . -p 3000 &

      - name: Wait for server
        run: sleep 4

      - name: Generate PDF
        run: node generate-pdf.js

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletter.pdf
          git diff --staged --quiet || git commit -m "chore: regenerate newsletter.pdf [skip ci]"
          git push
